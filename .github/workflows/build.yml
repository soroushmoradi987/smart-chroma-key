name: Build Smart Chroma Key

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Configure
        run: cmake --preset macos

      - name: Build
        run: cmake --build build_macos --config Release

      - name: Package
        run: |
          mkdir -p package
          cp -R build_macos/Release/smart-chroma-key.plugin package/
          cd package && zip -r ../smart-chroma-key-macos.zip smart-chroma-key.plugin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-chroma-key-macos
          path: smart-chroma-key-macos.zip

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Build And Package (ZIP + EXE)
        shell: pwsh
        run: |
          .github/scripts/Build-Installer-Windows.ps1 -Target x64 -Configuration Release -InstallDependencies

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-chroma-key-windows
          path: |
            release/*.zip
            release/*-installer.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            smart-chroma-key-macos/smart-chroma-key-macos.zip
            smart-chroma-key-windows/*.zip
            smart-chroma-key-windows/*-installer.exe
          generate_release_notes: true
