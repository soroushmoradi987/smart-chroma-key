name: Build Smart Chroma Key

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Configure
        run: cmake --preset macos

      - name: Build
        run: cmake --build build_macos --config Release

      - name: Package
        run: |
          mkdir -p package
          cp -R build_macos/Release/smart-chroma-key.plugin package/
          cd package && zip -r ../smart-chroma-key-macos.zip smart-chroma-key.plugin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-chroma-key-macos
          path: smart-chroma-key-macos.zip

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Configure
        run: cmake --preset windows-x64

      - name: Build
        run: cmake --build build_x64 --config Release

      - name: Package
        shell: pwsh
        run: |
          $pluginDir = "package/smart-chroma-key"
          New-Item -ItemType Directory -Force -Path "$pluginDir/bin/64bit"
          New-Item -ItemType Directory -Force -Path "$pluginDir/data/locale"

          # Find and copy the DLL
          $dll = Get-ChildItem -Recurse -Filter "smart-chroma-key.dll" -Path "build_x64" | Select-Object -First 1
          if ($dll) {
            Copy-Item $dll.FullName "$pluginDir/bin/64bit/"
          }

          # Copy data files
          Copy-Item "data/smart-chroma-key.effect" "$pluginDir/data/"
          Copy-Item "data/locale/en-US.ini" "$pluginDir/data/locale/"

          Compress-Archive -Path "package/smart-chroma-key" -DestinationPath "smart-chroma-key-windows.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-chroma-key-windows
          path: smart-chroma-key-windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            smart-chroma-key-macos/smart-chroma-key-macos.zip
            smart-chroma-key-windows/smart-chroma-key-windows.zip
          generate_release_notes: true
